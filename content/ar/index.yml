title: منصة إنتاجية المطورين المدعومة بالذكاء الاصطناعي!
cta:
  title: مستعد لبناء صفحة هبوط مذهلة؟
  description: انضم لآلاف المطورين الذين يبنون مع Nuxt و Nuxt UI. احصل على هذا القالب وابدأ الإطلاق اليوم.
  links:
    - label: ابدأ البناء
      to: https://ui.nuxt.com/docs/getting-started/installation/nuxt
      target: _blank
      trailingIcon: i-lucide-arrow-left
    - label: شاهد على GitHub
      to: https://github.com/nuxt-ui-templates/landing
      target: _blank
      variant: subtle
      icon: i-simple-icons-github
description: عزّز إنتاجيتك البرمجية مع رؤى مدعومة بالذكاء الاصطناعي تخبرك متى وكيف تبرمج بأقصى كفاءة.
features:
  title: تحكّم في [إنتاجيتك]{.text-primary}
  description: اجعل كل جلسة برمجة مثمرة مع التحليلات الذكية وتحسين سير العمل.
  features:
    - title: تتبع التركيز بالذكاء الاصطناعي
      description: اكتشف ساعات البرمجة المثلى مع تحليل الذكاء الاصطناعي في الوقت الفعلي لأنماط إنتاجيتك.
      icon: i-lucide-wand-sparkles
      ui:
        leading: bg-accented/50 p-2 rounded-md border border-muted border-dashed
    - title: تنبيهات التشتت
      description: احصل على إشعارات عندما ينحرف تركيزك وأعد انتباهك.
      icon: i-lucide-bell-ring
      ui:
        leading: bg-accented/50 p-2 rounded-md border border-muted border-dashed
    - title: مقتطفات الكود الذكية
      description: احفظ وأعد استخدام كتل الكود المستخدمة بشكل متكرر لتحقيق الكفاءة.
      icon: i-lucide-code-xml
      ui:
        leading: bg-accented/50 p-2 rounded-md border border-muted border-dashed
    - title: وضع العمل العميق
      description: احجب المشتتات وحدد جلسات برمجة منظمة مع مؤقتات بومودورو المدمجة.
      icon: i-lucide-moon
      ui:
        leading: bg-accented/50 p-2 rounded-md border border-muted border-dashed
    - title: رؤى تعاونية
      description: زامن سير عملك مع زملائك وشاهد متى يكونون أكثر إنتاجية.
      icon: i-lucide-mouse-pointer-2
      ui:
        leading: bg-accented/50 p-2 rounded-md border border-muted border-dashed
    - title: تحليلات الأداء
      description: تتبّع مقاييس البرمجة واحصل على رؤى لتعزيز سرعتك وجودة الكود.
      icon: i-lucide-chart-line
      ui:
        leading: bg-accented/50 p-2 rounded-md border border-muted border-dashed
hero:
  links:
    - label: Nuxt Studio
      icon: i-tabler-brand-nuxt
      trailing: true
