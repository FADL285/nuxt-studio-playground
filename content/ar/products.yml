faq:
  title: الأسئلة الشائعة
  items:
    - question: كيف يمكنني تتبع طلبي؟
      answer: بعد إتمام الطلب، ستتلقى رسالة بريد إلكتروني تحتوي على رقم التتبع ورابط لمتابعة حالة الشحنة.
    - question: ما هي طرق الدفع المتاحة؟
      answer: نقبل الدفع عبر بطاقات الائتمان (فيزا، ماستركارد)، الدفع عند الاستلام، والتحويل البنكي.
    - question: هل يمكنني تغيير عنوان التوصيل بعد الطلب؟
      answer: نعم، يمكنك تعديل عنوان التوصيل خلال ساعة من تأكيد الطلب عبر التواصل مع خدمة العملاء.
    - question: ما هي سياسة الإرجاع؟
      answer: يمكنك إرجاع المنتج خلال 30 يومًا من تاريخ الاستلام بشرط أن يكون بحالته الأصلية مع العبوة الكاملة.
