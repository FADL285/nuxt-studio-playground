<!DOCTYPE html>
<html lang="en">
<head>
  <title>Content Studio</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --background: #0d1117;
      --surface: #161b22;
      --surface-hover: #21262d;
      --border: #30363d;
      --text-primary: #f0f6fc;
      --text-secondary: #8b949e;
      --accent: #238636;
      --accent-hover: #2ea043;
      --error: #f85149;
      --error-bg: rgba(248, 81, 73, 0.1);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
      background: var(--background);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.5;
    }

    .login-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 48px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 16px 32px rgba(1, 4, 9, 0.85);
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
    }

    .logo img { width: 48px; height: 48px; }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .header p {
      color: var(--text-secondary);
      font-size: 16px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text-primary);
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--background);
      color: var(--text-primary);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: #388bfd;
      box-shadow: 0 0 0 3px rgba(56, 139, 253, 0.3);
    }

    .submit-btn {
      width: 100%;
      padding: 12px 20px;
      border: none;
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }

    .submit-btn:hover { background: var(--accent-hover); }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error-msg {
      display: none;
      padding: 10px 12px;
      border-radius: 6px;
      background: var(--error-bg);
      border: 1px solid var(--error);
      color: var(--error);
      font-size: 14px;
      margin-bottom: 16px;
    }

    .error-msg.visible { display: block; }

    .footer {
      text-align: center;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .footer p {
      color: var(--text-secondary);
      font-size: 13px;
    }

    @media (max-width: 480px) {
      .login-container { padding: 32px 24px; margin: 16px; }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <img src="https://nuxt.com/assets/design-kit/icon-white.svg" alt="Nuxt Logo" />
    </div>

    <div class="header">
      <h1>Content Studio</h1>
      <p>Sign in to edit your website content.</p>
    </div>

    <div id="error" class="error-msg"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email" placeholder="editor@example.com" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter your password" />
      </div>

      <button type="submit" class="submit-btn" id="submit-btn">Sign in</button>
    </form>

    <div class="footer">
      <p>Powered by Nuxt Studio</p>
    </div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      var btn = document.getElementById('submit-btn');
      var errorEl = document.getElementById('error');
      var email = document.getElementById('email').value;
      var password = document.getElementById('password').value;

      btn.disabled = true;
      btn.textContent = 'Signing in...';
      errorEl.className = 'error-msg';

      try {
        var res = await fetch('/api/studio/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, password: password })
        });

        if (!res.ok) {
          var data = await res.json().catch(function() { return {}; });
          throw new Error(data.message || 'Invalid credentials');
        }

        window.location.href = '/';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.className = 'error-msg visible';
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
